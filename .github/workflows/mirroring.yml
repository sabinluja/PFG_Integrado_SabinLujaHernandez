name: CI — FL IDS Workers

on: push

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias de app.py
        run: pip install fastapi uvicorn requests requests-toolbelt

      - name: Verificar que docker-compose.yml es válido
        run: docker compose config --quiet && echo "✅ docker-compose.yml válido"

      - name: Verificar sintaxis de app.py
        run: python -m py_compile ia-dataapp/app.py && echo "✅ app.py sin errores de sintaxis"

      - name: Verificar sintaxis de pfg_ids_fl_flow.py
        run: python -m py_compile pfg_ids_fl_flow.py && echo "✅ pfg_ids_fl_flow.py sin errores de sintaxis"