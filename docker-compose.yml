        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker2
    ports:
      - "${WORKER2_PORT}:8449"
      - "8893:8889"
      - "8085:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER2_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER2_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER2_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER2_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER2_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER2_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER2_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER2_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker2:8500/health
      - CONNECTOR_UUID=${WORKER2_CONNECTOR_UUID}
      - DEFAULT_ENDPOINT=${WORKER2_DEFAULT_ENDPOINT}
    volumes:
      - ./worker2/ecc:/config
      - ./certs:/cert
      - ecc_worker2_data:/home/nobody/data/
    extra_hosts:
      - "ecc-worker2:172.17.0.1"
    depends_on:
      - omejdn-nginx
      - broker-reverseproxy

  be-dataapp-worker2:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
