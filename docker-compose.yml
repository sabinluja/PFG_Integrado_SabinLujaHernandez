      - ECC_HOSTNAME=ecc-worker2
      - ISSUER_CONNECTOR_URI=${WORKER2_ISSUER_CONNECTOR_URI}
      - PEER_ECC_URLS=https://ecc-worker1:8889/data,https://ecc-worker3:8889/data
      - PEER_CONNECTOR_URIS=${WORKER1_ISSUER_CONNECTOR_URI},${WORKER3_ISSUER_CONNECTOR_URI}
      - FL_AUTHORIZED_URIS=${WORKER1_ISSUER_CONNECTOR_URI},${WORKER3_ISSUER_CONNECTOR_URI}
      - BROKER_URL=${BROKER_URL}
      - FL_ROUNDS=${FL_ROUNDS}
      - ROUND_TIMEOUT=${ROUND_TIMEOUT}
      - TZ=Europe/Rome
    volumes:
      - ./ia-dataapp/data/worker2:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker2:/cert/dataapp
      - ./omejdn/keys/worker2.cert:/cert/daps/worker.cert
      - ./omejdn/keys/worker2.key:/cert/daps/worker.key
    depends_on:
      - ecc-worker2

  # ===========================================================================
  # WORKER 3
  # ===========================================================================

  ecc-worker3:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker3
    ports:
      - "${WORKER3_PORT}:8449"
      - "8894:8889"
      - "8089:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER3_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER3_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER3_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER3_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
