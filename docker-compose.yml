  be-dataapp-worker2:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      options:
        max-size: "100M"
    networks:
