        condition: service_started
      broker-core:
        condition: service_healthy
      ecc-worker2:
        condition: service_healthy

  be-dataapp-worker3:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      options:
        max-size: "100M"
    networks:
      - idsa
    container_name: be-dataapp-worker3
    ports:
      - "5003:8500"
    environment:
      - INSTANCE_ID=3
      - ECC_HOSTNAME=ecc-worker3
      - ISSUER_CONNECTOR_URI=${WORKER3_ISSUER_CONNECTOR_URI}
      - BROKER_URL=${BROKER_URL}
      - TZ=Europe/Rome
      - LLM_ENDPOINT=${LLM_ENDPOINT}
      - LLM_MODEL=${LLM_MODEL}
      - API_USER=${API_USER}
      - API_PASS=${API_PASS}
      - WS_ECC=${WS_ECC}
      - FL_IDS_ECC_ONLY=${FL_IDS_ECC_ONLY}
      - FL_WEIGHTS_VIA_ECC=${FL_WEIGHTS_VIA_ECC}
      - COORDINATOR_CSV_REFERENCE=${COORDINATOR_CSV_REFERENCE}
      - CLEARING_HOUSE_URL=${CLEARING_HOUSE_URL}
      - CLEARING_HOUSE_CONNECTOR_URI=${CLEARING_HOUSE_CONNECTOR_URI}
      - CLEARING_HOUSE_ECC_URL=${CLEARING_HOUSE_ECC_URL}
    volumes:
      - ./ia-dataapp/data/worker3:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker3:/cert/dataapp
      - ./DAPS/keys/worker3.cert:/cert/daps/worker.cert
      - ./DAPS/keys/worker3.key:/cert/daps/worker.key
    depends_on:
      - ecc-worker3
      - clearinghouse
      - ecc-clearinghouse

  # ===========================================================================
  # WORKER 4 — Sin acceso al modelo FL (solo intenta acceder, es rechazado)
  #
  # Worker 4 es un conector IDS legítimo:
  #   ✔ Obtiene token DAT del DAPS — está registrado como cliente
  #   ✔ Se registra en el Broker — aparece en el catálogo de conectores
  #   ✘ El coordinador (app.py) lo rechaza al intentar unirse al FL
  #     porque su URI no está en PEER_CONNECTOR_URIS de los workers 1-3
  # ===========================================================================

  ecc-worker4:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker4
    ports:
      - "${WORKER4_PORT}:8449"
      - "8895:8889"
      - "8087:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER4_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER4_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER4_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER4_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER4_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER4_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER4_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER4_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker4:8500/health
      - CONNECTOR_UUID=${WORKER4_CONNECTOR_UUID}
      - DEFAULT_ENDPOINT=${WORKER4_DEFAULT_ENDPOINT}
    volumes:
      - ./worker4/ecc:/config
      - ./certs:/cert
      - ecc_worker4_data:/home/nobody/data/
    extra_hosts:
      - "ecc-worker4:172.17.0.1"
    depends_on:
      omejdn-nginx:
        condition: service_started
      broker-core:
        condition: service_healthy
      ecc-worker3:
        condition: service_healthy

  be-dataapp-worker4:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "100M"
    networks:
      - idsa
    container_name: be-dataapp-worker4
    ports:
      - "5004:8500"
    environment:
      - INSTANCE_ID=4
      - ECC_HOSTNAME=ecc-worker4
      - ISSUER_CONNECTOR_URI=${WORKER4_ISSUER_CONNECTOR_URI}
      - FL_OPT_OUT=true
      - BROKER_URL=${BROKER_URL}
      - TZ=Europe/Rome
      - LLM_ENDPOINT=${LLM_ENDPOINT}
      - LLM_MODEL=${LLM_MODEL}
      - API_USER=${API_USER}
      - API_PASS=${API_PASS}
      - WS_ECC=${WS_ECC}
      - FL_IDS_ECC_ONLY=${FL_IDS_ECC_ONLY}
      - FL_WEIGHTS_VIA_ECC=${FL_WEIGHTS_VIA_ECC}
      - COORDINATOR_CSV_REFERENCE=${COORDINATOR_CSV_REFERENCE}
      - CLEARING_HOUSE_URL=${CLEARING_HOUSE_URL}
      - CLEARING_HOUSE_CONNECTOR_URI=${CLEARING_HOUSE_CONNECTOR_URI}
      - CLEARING_HOUSE_ECC_URL=${CLEARING_HOUSE_ECC_URL}
    volumes:
      - ./ia-dataapp/data/worker4:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker4:/cert/dataapp
      - ./DAPS/keys/worker4.cert:/cert/daps/worker.cert
      - ./DAPS/keys/worker4.key:/cert/daps/worker.key
    depends_on:
      - ecc-worker4
      - clearinghouse
      - ecc-clearinghouse

  # ===========================================================================
  # LLM — Ollama Local
  # Recomendación inteligente de Datasets
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - idsa
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && wait" ]
    healthcheck:
      test: [ "CMD", "ollama", "show", "llama3.2" ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 30s

  # ===========================================================================
  # CLEARING HOUSE — IDS Audit & Logging Service
  # Notario digital IDS: registra y encadena (hash) todos los mensajes
  # intercambiados entre conectores para garantizar trazabilidad y soberanía.
  # Puerto host 8100 → 8000
  # ===========================================================================
  clearinghouse:
    build:
      context: ./ClearingHouse
      dockerfile: Dockerfile
    image: clearinghouse:latest
    container_name: clearinghouse
    entrypoint:
      - uvicorn
    command:
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
    networks:
      - idsa
    ports:
      - "8100:8000"
    environment:
      - CH_MONGO_URI=mongodb://mongo-ch:27017
      - CH_MONGO_DB_NAME=clearinghouse
      - CH_DEBUG=false
      - CH_LOG_LEVEL=INFO
      - CH_ENABLE_AUTH=false
      - CH_REQUIRE_DAT_TOKEN=false
      - CH_VALIDATE_IDS_MESSAGES=false
      - CH_ENABLE_ALERTS=true
      - CH_LOG_RETENTION_DAYS=90
    depends_on:
      mongo-ch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      options:
        max-size: "50M"

  ecc-clearinghouse:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-clearinghouse
    ports:
      - "${CLEARING_HOUSE_PORT}:8449"
      - "8896:8889"
      - "8088:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=http://clearinghouse:8000/data
      - MULTIPART_EDGE=form
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${CLEARING_HOUSE_CONNECTOR_URI}
      - IDSCP2=false
      - WS_EDGE=false
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=true
      - FETCH_TOKEN_ON_STARTUP=false
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${CLEARING_HOUSE_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${CLEARING_HOUSE_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${CLEARING_HOUSE_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=false
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://clearinghouse:8000/health
      - CONNECTOR_UUID=${CLEARING_HOUSE_CONNECTOR_UUID}
      - DEFAULT_ENDPOINT=${CLEARING_HOUSE_DEFAULT_ENDPOINT}
    volumes:
      - ./ClearingHouse/ecc:/config
      - ./certs:/cert
      - ecc_clearinghouse_data:/home/nobody/data/
    extra_hosts:
      - "ecc-clearinghouse:172.17.0.1"
    depends_on:
      clearinghouse:
        condition: service_healthy

  mongo-ch:
    image: mongo:7.0
    container_name: mongo-ch
    networks:
      - idsa
    volumes:
      - mongo_ch_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  idsa: {} # red única — todos los contenedores se ven entre sí

volumes:
  ecc_worker1_data: {}
  ecc_worker2_data: {}
  ecc_worker3_data: {}
  ecc_worker4_data: {}
  ecc_clearinghouse_data: {}
  broker_fuseki_data: {}
  ollama_data: {}
  mongo_ch_data: {}
