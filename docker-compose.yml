    container_name: be-dataapp-worker2
    ports:
      - "5002:8500"
    environment:
      - INSTANCE_ID=2
      - ECC_HOSTNAME=ecc-worker2
      - ISSUER_CONNECTOR_URI=${WORKER2_ISSUER_CONNECTOR_URI}
      - BROKER_URL=${BROKER_URL}
      - TZ=Europe/Rome
      - LLM_ENDPOINT=${LLM_ENDPOINT}
      - LLM_MODEL=${LLM_MODEL}
      - API_USER=${API_USER}
      - API_PASS=${API_PASS}
      - WS_ECC=${WS_ECC}
      - FL_IDS_ECC_ONLY=${FL_IDS_ECC_ONLY}
      - FL_WEIGHTS_VIA_ECC=${FL_WEIGHTS_VIA_ECC}
      - COORDINATOR_CSV_REFERENCE=${COORDINATOR_CSV_REFERENCE}
      - CLEARING_HOUSE_URL=${CLEARING_HOUSE_URL}
      - CLEARING_HOUSE_CONNECTOR_URI=${CLEARING_HOUSE_CONNECTOR_URI}
      - CLEARING_HOUSE_ECC_URL=${CLEARING_HOUSE_ECC_URL}
    volumes:
      - ./ia-dataapp/data/worker2:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker2:/cert/dataapp
      - ./DAPS/keys/worker2.cert:/cert/daps/worker.cert
      - ./DAPS/keys/worker2.key:/cert/daps/worker.key
    depends_on:
