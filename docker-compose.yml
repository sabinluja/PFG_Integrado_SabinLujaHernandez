services:

  # ===========================================================================
  # WORKER 1 — ecc-worker1 + be-dataapp-worker1
  #
  # Cualquiera de los 3 workers puede ser coordinator.
  # TÚ decides desde Postman a cuál envías el algorithm.py.
  # Postman llama a:  POST http://localhost:500N/proxy
  # ===========================================================================

  ecc-worker1:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker1
    ports:
      - "${WORKER1_PORT}:8449"   # Self-description API — Postman puede explorar
      - "8889:8889"              # ECC-to-ECC
      - "8086:8086"              # Webhook
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER1_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER1_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER1_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER1_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER1_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER1_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER1_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER1_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker1:8500/health
    volumes:
      - ./worker1/ecc:/config
      - ./certs:/cert
      - ecc_worker1_data:/home/nobody/data/
    extra_hosts:
      - "ecc-worker1:172.17.0.1"

  be-dataapp-worker1:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      options:
        max-size: "100M"
    networks:
      - idsa
    container_name: be-dataapp-worker1
    ports:
      - "5001:8500"   # /proxy para Postman + /data + monitorización
    environment:
      - INSTANCE_ID=1
      - ECC_HOSTNAME=ecc-worker1
      - ISSUER_CONNECTOR_URI=${WORKER1_ISSUER_CONNECTOR_URI}
      - PEER_ECC_URLS=https://ecc-worker2:8889/data,https://ecc-worker3:8889/data
      - PEER_CONNECTOR_URIS=${WORKER2_ISSUER_CONNECTOR_URI},${WORKER3_ISSUER_CONNECTOR_URI}
      - FL_ROUNDS=${FL_ROUNDS}
      - ROUND_TIMEOUT=${ROUND_TIMEOUT}
      - TZ=Europe/Rome
    volumes:
      - ./ia-dataapp/data/worker1:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker1:/cert/dataapp
    depends_on:
      - ecc-worker1

  # ===========================================================================
  # WORKER 2
  # ===========================================================================

  ecc-worker2:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker2
    ports:
      - "${WORKER2_PORT}:8449"
      - "8893:8889"
      - "8085:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER2_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER2_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER2_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER2_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER2_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER2_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER2_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER2_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker2:8500/health
    volumes:
      - ./worker2/ecc:/config
      - ./certs:/cert
      - ecc_worker2_data:/home/nobody/data/
    extra_hosts:
      - "ecc-worker2:172.17.0.1"

  be-dataapp-worker2:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      options:
        max-size: "100M"
    networks:
      - idsa
    container_name: be-dataapp-worker2
    ports:
      - "5002:8500"
    environment:
      - INSTANCE_ID=2
      - ECC_HOSTNAME=ecc-worker2
      - ISSUER_CONNECTOR_URI=${WORKER2_ISSUER_CONNECTOR_URI}
      - PEER_ECC_URLS=https://ecc-worker1:8889/data,https://ecc-worker3:8889/data
      - PEER_CONNECTOR_URIS=${WORKER1_ISSUER_CONNECTOR_URI},${WORKER3_ISSUER_CONNECTOR_URI}
      - FL_ROUNDS=${FL_ROUNDS}
      - ROUND_TIMEOUT=${ROUND_TIMEOUT}
      - TZ=Europe/Rome
    volumes:
      - ./ia-dataapp/data/worker2:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker2:/cert/dataapp
    depends_on:
      - ecc-worker2

  # ===========================================================================
  # WORKER 3
  # ===========================================================================

  ecc-worker3:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker3
    ports:
      - "${WORKER3_PORT}:8449"
      - "8894:8889"
      - "8089:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER3_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER3_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER3_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER3_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER3_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER3_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER3_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER3_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker3:8500/health
    volumes:
      - ./worker3/ecc:/config
      - ./certs:/cert
      - ecc_worker3_data:/home/nobody/data/
    extra_hosts:
      - "ecc-worker3:172.17.0.1"

  be-dataapp-worker3:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      options:
        max-size: "100M"
    networks:
      - idsa
    container_name: be-dataapp-worker3
    ports:
      - "5003:8500"
    environment:
      - INSTANCE_ID=3
      - ECC_HOSTNAME=ecc-worker3
      - ISSUER_CONNECTOR_URI=${WORKER3_ISSUER_CONNECTOR_URI}
      - PEER_ECC_URLS=https://ecc-worker1:8889/data,https://ecc-worker2:8889/data
      - PEER_CONNECTOR_URIS=${WORKER1_ISSUER_CONNECTOR_URI},${WORKER2_ISSUER_CONNECTOR_URI}
      - FL_ROUNDS=${FL_ROUNDS}
