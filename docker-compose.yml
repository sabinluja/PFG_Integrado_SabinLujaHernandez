  # ===========================================================================

  ecc-worker3:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker3
    ports:
      - "${WORKER3_PORT}:8449"
      - "8894:8889"
      - "8089:8086"
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER3_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER3_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER3_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER3_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER3_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER3_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER3_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER3_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker3:8500/health
      - CONNECTOR_UUID=${WORKER3_CONNECTOR_UUID}
      - DEFAULT_ENDPOINT=${WORKER3_DEFAULT_ENDPOINT}
    volumes:
