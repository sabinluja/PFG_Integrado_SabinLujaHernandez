    networks:
      - idsa
    container_name: be-dataapp-worker3
    ports:
      - "5003:8500"
    environment:
      - INSTANCE_ID=3
      - ECC_HOSTNAME=ecc-worker3
      - ISSUER_CONNECTOR_URI=${WORKER3_ISSUER_CONNECTOR_URI}
      - PEER_ECC_URLS=https://ecc-worker1:8889/data,https://ecc-worker2:8889/data
      - PEER_CONNECTOR_URIS=${WORKER1_ISSUER_CONNECTOR_URI},${WORKER2_ISSUER_CONNECTOR_URI}
      - FL_AUTHORIZED_URIS=${WORKER1_ISSUER_CONNECTOR_URI},${WORKER2_ISSUER_CONNECTOR_URI}
