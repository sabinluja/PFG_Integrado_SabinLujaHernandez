services:

  # ===========================================================================
  # DAPS — omejdn-server + nginx
  #
  # Arquitectura idéntica al testbed:
  #   omejdn-server  → idstestbed/omejdn-server:1.6.0  (solo interno)
  #   omejdn-nginx   → nginx:1.25.3 con TLS (hostname "omejdn" en red Docker)
  #
  # Los ECC apuntan al DAPS a través de nginx:
  #   application.dapsUrl     = https://omejdn/auth/token
  #   application.dapsJWKSUrl = https://omejdn/auth/jwks.json
  #
  # Los 4 workers obtienen token DAT válido.
  # La denegación del Worker 4 ocurre en app.py (capa FL), no aquí.
  # ===========================================================================

  omejdn-server:
    image: idstestbed/omejdn-server:1.6.0
    container_name: omejdn-server
    networks:
      - idsa
    environment:
      - OMEJDN_ISSUER=https://omejdn/auth
      - OMEJDN_FRONT_URL=https://omejdn/auth
      - OMEJDN_OPENID=true
      - OMEJDN_ENVIRONMENT=production
      - OMEJDN_ACCEPT_AUDIENCE=idsc:IDS_CONNECTORS_ALL
      - OMEJDN_DEFAULT_AUDIENCE=idsc:IDS_CONNECTORS_ALL
      - OMEJDN_ADMIN=admin:admin
    volumes:
      - ./DAPS/config:/opt/config
      - ./DAPS/keys:/opt/keys

  omejdn-nginx:
    image: nginx:1.25.3
    container_name: omejdn
    networks:
      - idsa
    ports:
      - "4567:443"
    environment:
      - OMEJDN_DOMAIN=omejdn
      - OMEJDN_PATH=/auth
      - UI_PATH=auth/ui
    volumes:
      - ./DAPS/nginx.conf:/etc/nginx/templates/default.conf.template
      - ./DAPS/keys/TLS/daps.cert:/etc/nginx/daps.cert
      - ./DAPS/keys/TLS/daps.key:/etc/nginx/daps.key
    depends_on:
      - omejdn-server
    healthcheck:
      test: [ "CMD", "curl", "-sk", "https://localhost/auth/jwks.json" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ===========================================================================
  # BROKER — IDS Metadata Broker
  #
  # Arquitectura idéntica al testbed: reverseproxy + core + fuseki
  #   broker-reverseproxy → idstestbed/mdb-reverseproxy:5.0.3
  #   broker-core         → idstestbed/metadatabroker-core:5.0.3
  #   broker-fuseki       → idstestbed/mdb-fuseki:5.0.3
  #
  # Puerto host 444 → 443  (HTTPS igual que testbed)
  # Puerto host 81  → 80   (HTTP)
  #
  # Todos los ECC (workers 1-4) se auto-registran al arrancar.
  # Worker 4 aparece en el catálogo — es un conector IDS legítimo.
  # La denegación FL ocurre en app.py, no aquí.
  # ===========================================================================

  broker-reverseproxy:
    image: idstestbed/mdb-reverseproxy:5.0.3
    container_name: broker-reverseproxy
    networks:
      - idsa
    ports:
      - "444:443"
      - "81:80"
    volumes:
      - ./broker/server.crt:/etc/cert/server.crt
      - ./broker/server.key:/etc/cert/server.key
    depends_on:
      - broker-core

  broker-core:
    restart: on-failure:5
    image: idstestbed/metadatabroker-core:5.0.3
    container_name: broker-core
    networks:
      - idsa
    expose:
      - "8080"
    environment:
      - SPARQL_ENDPOINT=http://broker-fuseki:3030/connectorData
      - DAPS_VALIDATE_INCOMING=true
      - DAPS_URL=https://omejdn/auth/token
      - COMPONENT_URI=https://broker-reverseproxy/
      - COMPONENT_CATALOG_URI=https://broker-reverseproxy/connectors/
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O- http://localhost:8080/ > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./broker/isstbroker-keystore.jks:/etc/cert/isstbroker-keystore.jks
    depends_on:
      broker-fuseki:
        condition: service_started
      omejdn-nginx:
        condition: service_healthy

  broker-fuseki:
    image: idstestbed/mdb-fuseki:5.0.3
    container_name: broker-fuseki
    networks:
      - idsa
    ports:
      - "3030:3030"
    expose:
      - "3030"
    volumes:
      - broker_fuseki_data:/fuseki

  # ===========================================================================
  # WORKER 1
  # ===========================================================================

  ecc-worker1:
    image: rdlabengpa/ids_execution_core_container:v1.14.8
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    logging:
      options:
        max-size: "200M"
    networks:
      - idsa
    container_name: ecc-worker1
    ports:
      - "${WORKER1_PORT}:8449" # Self-description API — Postman puede explorar
      - "8889:8889" # ECC-to-ECC
      - "8086:8086" # Webhook
    environment:
      - "JDK_JAVA_OPTIONS=-Xmx1024m"
      - "SPRING_PROFILES_ACTIVE=docker"
      - DATA_APP_ENDPOINT=${WORKER1_DATA_APP_ENDPOINT}
      - MULTIPART_EDGE=${WORKER1_MULTIPART_EDGE}
      - MULTIPART_ECC=${MULTIPART_ECC}
      - CONNECTOR_ID=${WORKER1_ISSUER_CONNECTOR_URI}
      - IDSCP2=${IDSCP2}
      - WS_EDGE=${WORKER1_WS_EDGE}
      - WS_ECC=${WS_ECC}
      - BROKER_URL=${BROKER_URL}
      - CACHE_TOKEN=${CACHE_TOKEN}
      - FETCH_TOKEN_ON_STARTUP=${FETCH_TOKEN_ON_STARTUP}
      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER1_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER1_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER1_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
      - TRUSTORE_PASSWORD=${TRUSTORE_PASSWORD}
      - FIREWALL=${WORKER1_ECC_FIREWALL}
      - TZ=Europe/Rome
      - AES256-SECRET-KEY=${AES_SECRET_KEY}
      - DATA_APP_HEALTH_ENDPOINT=http://be-dataapp-worker1:8500/health
      - CONNECTOR_UUID=${WORKER1_CONNECTOR_UUID}
      - DEFAULT_ENDPOINT=${WORKER1_DEFAULT_ENDPOINT}
    volumes:
      - ./worker1/ecc:/config
      - ./certs:/cert
      - ecc_worker1_data:/home/nobody/data/
    extra_hosts:
      - "ecc-worker1:172.17.0.1"
    depends_on:
      omejdn-nginx:
        condition: service_started
      broker-core:
        condition: service_healthy

  be-dataapp-worker1:
    build:
      context: ./ia-dataapp
      dockerfile: Dockerfile
    image: ia-dataapp:latest
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      options:
        max-size: "100M"
    networks:
      - idsa
    container_name: be-dataapp-worker1
    ports:
      - "5001:8500" # /proxy para Postman + /data + monitorización
    environment:
      - INSTANCE_ID=1
      - ECC_HOSTNAME=ecc-worker1
      - ISSUER_CONNECTOR_URI=${WORKER1_ISSUER_CONNECTOR_URI}
      - BROKER_URL=${BROKER_URL}
      - TZ=Europe/Rome
      - LLM_ENDPOINT=${LLM_ENDPOINT}
      - LLM_MODEL=${LLM_MODEL}
      - API_USER=${API_USER}
      - API_PASS=${API_PASS}
      - WS_ECC=${WS_ECC}
      - FL_IDS_ECC_ONLY=${FL_IDS_ECC_ONLY}
      - FL_WEIGHTS_VIA_ECC=${FL_WEIGHTS_VIA_ECC}
      - COORDINATOR_CSV_REFERENCE=${COORDINATOR_CSV_REFERENCE}
      - CLEARING_HOUSE_URL=${CLEARING_HOUSE_URL}
      - CLEARING_HOUSE_CONNECTOR_URI=${CLEARING_HOUSE_CONNECTOR_URI}
      - CLEARING_HOUSE_ECC_URL=${CLEARING_HOUSE_ECC_URL}
    volumes:
      - ./ia-dataapp/data/worker1:/home/nobody/data/
      - ./ia-dataapp/log:/home/nobody/log
      - ./certs:/cert
      - ./certs/dataapp/worker1:/cert/dataapp
      - ./DAPS/keys/worker1.cert:/cert/daps/worker.cert
      - ./DAPS/keys/worker1.key:/cert/daps/worker.key
    depends_on:
      - ecc-worker1
      - clearinghouse
      - ecc-clearinghouse

  # ===========================================================================
