      - KEYSTORE_NAME=${KEYSTORE_NAME}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ALIAS=${ALIAS}
      - DAPS_KEYSTORE_NAME=${WORKER2_DAPS_KEYSTORE_NAME}
      - DAPS_KEYSTORE_PASSWORD=${WORKER2_DAPS_KEYSTORE_PASSWORD}
      - DAPS_KEYSTORE_ALIAS=${WORKER2_DAPS_KEYSTORE_ALIAS}
      - TRUSTORE_NAME=${TRUSTORE_NAME}
